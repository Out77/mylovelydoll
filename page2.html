<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tera Mera Hai Pyaar Amar — for Alfiya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --wine-deep:#4a1330;
    --wine:#6d2148;
    --wine-soft:#8a3a63;
    --lavender-pale:#efe6f7;
    --lavender:#c8a8dd;
    --lavender-deep:#9d74b8;
    --paper:#faf5fb;
    --gold:#c9a66b;
    --ink:#3a2436;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;
    font-family:'Lora', serif;
    color:var(--lavender-pale);
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, #3a0f27 0%, transparent 60%),
      linear-gradient(180deg, var(--wine-deep) 0%, var(--wine) 45%, var(--wine-soft) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:7vh 6vw 8vh;
    overflow-x:hidden;
    position:relative;
  }

  /* ambient petals, quieter than page 1 */
  .petals{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .petal{ position:absolute; top:-5%; opacity:0.4; animation:drift linear infinite; }
  @keyframes drift{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); }
    100%{ transform:translateY(110vh) translateX(30px) rotate(200deg); }
  }

  .eyebrow{
    position:relative; z-index:1;
    letter-spacing:0.35em;
    text-transform:uppercase;
    font-size:0.68rem;
    color:var(--lavender);
    margin-bottom:1.4rem;
    opacity:0;
    animation:fadeUp 1s ease forwards 0.2s;
  }

  h1{
    position:relative; z-index:1;
    font-family:'Parisienne', cursive;
    font-weight:400;
    font-size:clamp(2.2rem, 7vw, 3.6rem);
    color:var(--paper);
    text-align:center;
    text-shadow:0 2px 24px rgba(157,116,184,0.5);
    opacity:0;
    animation:fadeUp 1.1s ease forwards 0.45s;
  }

  .caption{
    position:relative; z-index:1;
    margin-top:0.7rem;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:clamp(1rem, 2.4vw, 1.25rem);
    color:var(--lavender);
    text-align:center;
    opacity:0;
    animation:fadeUp 1.1s ease forwards 0.7s;
  }

  /* ===== VINYL PLAYER ===== */
  .player{
    position:relative; z-index:1;
    margin-top:3.2rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    opacity:0;
    animation:fadeUp 1.1s ease forwards 0.95s;
  }

  .vinyl-wrap{
    position:relative;
    width:150px;
    height:150px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .vinyl{
  width:150px;
    height:150px;
    border-radius:50%;
    background:
      repeating-radial-gradient(circle at center, #241019 0px, #241019 2px, #150910 3px, #150910 5px);
    box-shadow:0 12px 34px rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    animation:spin 6s linear infinite;
    animation-play-state:paused;
}

.vinyl.spinning{
    animation-play-state:running;
}
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .vinyl-label{
    width:56px;
    height:56px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #a54a77, var(--wine-deep) 75%);
    border:1.5px solid var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .vinyl-label span{
    font-family:'Parisienne', cursive;
    font-size:1.5rem;
    color:var(--gold);
  }



  .progress-row{
    margin-top:1.6rem;
    display:flex;
    align-items:center;
    gap:0.7rem;
    width:min(320px, 78vw);
  }
  .progress-track{
    flex:1;
    height:3px;
    background:rgba(239,230,247,0.25);
    border-radius:3px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--lavender), var(--gold));
  }
  .time{
    font-family:'Lora', serif;
    font-size:0.68rem;
    letter-spacing:0.04em;
    color:var(--lavender);
    min-width:2.6em;
    text-align:center;
  }

  .hint{
    margin-top:1rem;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:0.85rem;
    color:rgba(239,230,247,0.55);
  }

  /* ===== LYRICS ===== */
  .lyrics{
    position:relative; z-index:1;
    margin-top:4.2rem;
    max-width:560px;
    width:100%;
    background:linear-gradient(180deg, var(--paper), #f4ecf7);
    border-radius:4px;
    box-shadow:0 30px 70px rgba(20,4,15,0.45), 0 2px 0 rgba(255,255,255,0.5) inset;
    padding:clamp(2rem, 6vw, 3.2rem) clamp(1.6rem, 6vw, 3rem);
  }
  .lyrics::before{
    content:"";
    position:absolute;
    inset:14px;
    border:1px solid rgba(157,116,184,0.35);
    pointer-events:none;
  }

  .lyric-line{
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(1.15rem, 2.6vw, 1.45rem);
    line-height:1.9;
    color:var(--ink);
    text-align:center;
    opacity:0.32;
    transition:opacity 0.5s ease, color 0.5s ease, transform 0.5s ease;
    transform:scale(0.98);
  }
  .lyric-line.active{
    opacity:1;
    color:var(--wine);
    transform:scale(1.03);
    font-weight:500;
  }

  .divider{
    display:flex; align-items:center; justify-content:center;
    margin:1.4rem 0;
  }
  .divider svg{ width:50px; height:20px; opacity:0.7; }

  /* ===== CLOSING WHISPER ===== */
  .whisper{
    position:relative; z-index:1;
    margin-top:4rem;
    text-align:center;
  }
  .whisper h2{
    font-family:'Parisienne', cursive;
    font-weight:400;
    font-size:clamp(2rem, 6vw, 2.8rem);
    color:var(--paper);
  }
  .whisper p{
    margin-top:0.5rem;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.05rem;
    color:var(--lavender);
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(16px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; }
    .petal{ display:none; }
    .vinyl{ animation:none; }
  }
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="eyebrow">a song, just for you</div>
<h1>Tera Mera Hai Pyaar Amar</h1>
<p class="caption">my loveeee and bauniiii&nbsp;&mdash;&nbsp;this one's ours</p>

<div class="player">
  <div class="vinyl-wrap">
    <div class="vinyl" id="vinyl">
      <div class="vinyl-label"><span>A</span></div>
    </div>

  </div>

  <div class="progress-row">
    <span class="time" id="curTime">0:00</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span class="time" id="totalTime">1:00</span>
  </div>

  <p class="hint" id="hint">our song is playing</p>
</div>

<audio id="song" autoplay loop preload="auto">
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="lyrics" id="lyrics">
  <!-- lyric lines injected by JS -->
</div>

<div class="whisper">
  <h2>Tera Mera Hai Pyaar Amar</h2>
  <p>my loveeee and bauniiii, always.</p>
</div>

<script>
  // ---- ambient petals ----
  const container = document.getElementById('petals');
  const count = window.innerWidth < 600 ? 6 : 12;
  const colors = ['#c8a8dd', '#9d74b8', '#dcc6ea'];
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 6 + Math.random()*8;
    p.style.left = Math.random()*100 + 'vw';
    p.style.width = size+'px';
    p.style.height = (size*1.3)+'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius = '0 60% 0 60%';
    p.style.animationDuration = (14 + Math.random()*12) + 's';
    p.style.animationDelay = (Math.random()*-20) + 's';
    container.appendChild(p);
  }

  // ---- lyrics, timed across the first 60 seconds ----
  const lines = [
    "Hai Yeh Haqeeqat Ya Khaab Mera",
    "Rab Se Jo Manga Pura Hua",
    "Gaaye Gi Duniya Geet Hamare",
    "Ik Din Aisa Socha Na Tha",
    "Kadmon Mein Rakh Doon Duniya Ki Khusiyan",
    "Taaron Se Bhar Doon Jahan",
    "Ha hu Main Hoon Aashiq Ha Main Deewane",
    "Jo Bhi Hu Tera Piya",
    "Tera Mera Hai Pyar Amar",
    "Tu Chahe Tu Kadmon Mein Sar Rakh Doon",
    "Ye Jeevan Kya Agar Mange Tu",
    "Meri Jaan Nazar Kar Loon",
    "Tera Mera Hai Pyar Amar"
  ];

  const DURATION_CAP = 60; // seconds
  const perLine = DURATION_CAP / lines.length;

  const lyricsEl = document.getElementById('lyrics');
  const dividerSVG = `<div class="divider"><svg viewBox="0 0 50 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 10 C 13 2, 37 2, 48 10" stroke="#9d74b8" stroke-width="1"/>
      <circle cx="25" cy="10" r="2.5" fill="#9d74b8"/>
    </svg></div>`;

  lines.forEach((line, i) => {
    const lineEl = document.createElement('p');
    lineEl.className = 'lyric-line';
    lineEl.id = 'line-' + i;
    lineEl.textContent = line;
    lyricsEl.appendChild(lineEl);
    if (i === 8) { // small divider after the first refrain
      lyricsEl.insertAdjacentHTML('beforeend', dividerSVG);
    }
  });

  // ---- audio controls ----
  const audio = document.getElementById('song');
  const vinyl = document.getElementById('vinyl');
  const progressFill = document.getElementById('progressFill');
  const curTimeEl = document.getElementById('curTime');
  const totalTimeEl = document.getElementById('totalTime');
  const hint = document.getElementById('hint');


  function formatTime(s){
    const m = Math.floor(s/60);
    const sec = Math.floor(s%60).toString().padStart(2,'0');
    return m + ':' + sec;
  }

  function setActiveLine(t){
    const idx = Math.min(lines.length - 1, Math.floor(t / perLine));
    document.querySelectorAll('.lyric-line').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
    });
  }

audio.addEventListener('play', () => {
    vinyl.classList.add('spinning');
    hint.textContent = 'our song is playing ❤️';
  });

audio.addEventListener('pause', () => {
    vinyl.classList.remove('spinning');
});

  audio.addEventListener('timeupdate', () => {
    const t = audio.currentTime;
    
    progressFill.style.width = (t / DURATION_CAP * 100) + '%';
    curTimeEl.textContent = formatTime(t);
    setActiveLine(t);
  });

  audio.addEventListener('loadedmetadata', () => {
    totalTimeEl.textContent = formatTime(Math.min(DURATION_CAP, audio.duration || DURATION_CAP));
  });
window.addEventListener("load", () => {
    const audio = document.getElementById("song");
    audio.play().catch(() => {
        console.log("Autoplay blocked by browser.");
    });
});
</script>

</body>
</html>
